{% extends "core/base.html" %}
{% block title %}Login — LykoonAdds{% endblock %}
{% block main_class %}main-narrow{% endblock %}
{% block content %}
<div class="card">
  <span class="badge badge-teal" style="margin-bottom:16px"><i class="fa-solid fa-shield-halved"></i> Secure Login</span>
  <div class="card-title">Welcome back</div>
  <div class="card-sub">Login to your LykoonAdds account to keep earning.</div>
  <form method="post">
    {% csrf_token %}
    <label>Username or Email</label>
    <input type="text" name="username" required autofocus>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
  </form>
  <div class="link-row">Don't have an account? <a href="{% url 'core:register' %}">Create one</a></div>
</div>
{% endblock %}
